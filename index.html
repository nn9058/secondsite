<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的快捷导航</title>
    <style>
        body {
            font-family: -apple-system, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 90%;
            max-width: 400px;
        }
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            background: white;
            color: #333;
            text-decoration: none;
            border-radius: 12px;
            font-weight: bold;
            transition: transform 0.2s, background 0.2s;
            text-align: center;
        }
        .btn:hover {
            transform: translateY(-3px);
            background: #f0f0f0;
        }
        /* 响应式：小屏幕单列显示 */
        @media (max-width: 350px) {
            .container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <a href="https://github.com" target="_blank" class="btn">GitHub</a>
    <a href="https://www.cloudflare.com" target="_blank" class="btn">Cloudflare</a>
    <a href="https://www.youtube.com" target="_blank" class="btn">YouTube</a>
    <a href="https://x.com" target="_blank" class="btn">X.com</a>
    <a href="https://www.tailscale.com" target="_blank" class="btn">Tailscale</a>
    <a href="https://www.google.com" target="_blank" class="btn">Google</a>
</div>

</body>
</html>
